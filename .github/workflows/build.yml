name: CI / Release

on:
  push:
    branches:
      - dev
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  # En dev: solo validar que el código compila (rápido)
  typecheck:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Instalar dependencias
        run: pnpm install
      - name: Typecheck
        run: pnpm typecheck

  create-pr:
    needs: [typecheck]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - name: Crear Pull Request hacia main
        uses: repo-sync/pull-request@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: dev
          destination_branch: main
          pr_title: '🚀 dev → main'
          pr_body: |
            ## Typecheck exitoso ✅

            El código compila sin errores de TypeScript.

            ### Checklist antes de mergear
            - [ ] Revisé los cambios
            - [ ] No hay bugs conocidos sin resolver
          pr_draft: false

  # Solo al tagear: build completo + release
  build-mac:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Instalar dependencias
        run: pnpm install
      - name: Build Mac
        run: pnpm build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Subir DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Instalar dependencias
        run: pnpm install
      - name: Build Windows
        run: pnpm build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Subir EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/mac
      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/win
      - uses: softprops/action-gh-release@v2
        with:
          name: Mi Almacén ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          body: |
            ## ¿Qué hay en esta versión?

            ### Instalación
            - **Mac**: descarga el `.dmg`, ábrelo y arrastra la app a Aplicaciones
            - **Windows**: descarga el `.exe` y sigue el asistente de instalación

            ### Notas
            - Los datos se guardan localmente en el computador
            - Ante cualquier problema, contactar al desarrollador
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
