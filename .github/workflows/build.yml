name: CI / Release

on:
  push:
    branches:
      - dev
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  # En dev: solo validar que el código compila (rápido)
  typecheck:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Instalar dependencias
        run: pnpm install
      - name: Typecheck
        run: pnpm typecheck

  create-pr:
    needs: [typecheck]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - name: Crear Pull Request hacia main
        uses: repo-sync/pull-request@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: dev
          destination_branch: main
          pr_title: '🚀 dev → main'
          pr_body: |
            ## Typecheck exitoso ✅

            El código compila sin errores de TypeScript.

            ### Checklist antes de mergear
            - [ ] Revisé los cambios
            - [ ] No hay bugs conocidos sin resolver
          pr_draft: false

  sync-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # ← se activa cuando hay push a main (post-merge)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizar dev con main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout dev
          git rebase origin/main
          git push origin dev --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Solo al tagear: build completo + release
  build-mac:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Instalar dependencias
        run: pnpm install
      - name: Build Mac
        run: pnpm build:mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Instalar dependencias
        run: pnpm install
      - name: Build Windows
        run: pnpm build:win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          name: Mi Negocio Digital ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          body: |
            body: |
              # 🚀 Mi Negocio Digital ${{ github.ref_name }}

              Una nueva versión de **Mi Negocio Digital** ya está disponible.

              ---

              ## ✨ Highlights

              *
              *
              *

              ---

              ## 📦 Instalación

              ### Mac

              Descarga el archivo `.dmg`, ábrelo y arrastra la aplicación a la carpeta Aplicaciones.

              ### Windows

              Descarga el archivo `.exe` y sigue el asistente de instalación.

              ---

              ## ⚠️ Notas importantes

              * Los datos se almacenan localmente en el dispositivo.
              * Si macOS bloquea la app al abrirla:

                * Click derecho → Abrir
                * O ejecutar:

                  ```bash
                  xattr -cr /Applications/"Mi Negocio Digital.app"
                  ```

              ---

              ## 🛠️ Cambios técnicos

              *
              *
              *

              ---

              ## 🐞 Correcciones

              *
              *
              *

              ---

              ## ❤️ Gracias por usar Mi Negocio Digital

          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
